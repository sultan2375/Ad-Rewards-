<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Monetag SDK (FIXED HTTPS) -->
<script src="https://libtl.com/sdk.js" data-zone="10938120" data-sdk="show_10938120"></script>

<!-- ✅ Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Ad Reward App</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:350px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.progress {
  height:10px;
  background:#334155;
  margin-top:10px;
  border-radius:10px;
}

.fill {
  height:100%;
  background:#22c55e;
  width:0%;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="box">
  <h2>Ad Reward</h2>

  <p id="user">Checking login...</p>

  <p>Ads: <span id="ads">0</span></p>
  <p>Points: <span id="points">0</span></p>

  <div class="progress">
    <div class="fill" id="fill"></div>
</div>
  
  <button onclick="watchAd()">Watch Ad</button>
</div>

<script>
let ads = 0;
let points = 0;

// ✅ Telegram Login
let tg = window.Telegram.WebApp;
tg.expand();

if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
  let user = tg.initDataUnsafe.user;
  document.getElementById("user").innerText =
    "👤 " + user.first_name + " (" + user.id + ")";
} else {
  document.getElementById("user").innerText =
    "❌ Open from Telegram Bot";
}

// ✅ Update UI
function update() {
  document.getElementById("ads").innerText = ads;
  document.getElementById("points").innerText = points;
  document.getElementById("fill").style.width = (ads % 2)*2 + "%";
}

// ✅ Watch Ad (Monetag)
function watchAd() {
  if (typeof show_10938120 === 'function') {

    show_10938120().then(() => {
      ads++;
      points++;

      if (ads % 2 === 0) {
        points += 5;
        alert("🎁 Bonus +5");
      }

      update();
    }).catch(() => {
      alert("Ad failed ❌");
    });

  } else {
    alert("SDK not loaded ❌");
  }
}

update();
</script>

</body>
</html>
